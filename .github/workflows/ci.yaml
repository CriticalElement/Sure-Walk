name: CI
on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint-format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Run lint
        run: pnpm lint:mobile && pnpm lint:web
      - name: Run format check
        run: pnpm format:check

  build-android:
    needs: lint-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: sed -i 's/# //g' pnpm-workspace.yaml && pnpm install
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Grant execute permission for gradlew
        run: chmod +x apps/mobile/android/gradlew
      - name: Build debug APK
        run: cd apps/mobile/android && ./gradlew assembleDebug

  build-ios:
    needs: lint-format
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: sed -i 's/# //g' pnpm-workspace.yaml && pnpm install
      - name: Install dependencies
        run: |
          cd apps/mobile/ios && pod install --repo-update
      - name: Build iOS app (debug)
        run: |
          cd apps/mobile/ios && xcodebuild build -workspace SureWalkApp.xcworkspace \
            -scheme SureWalkApp \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGN_STYLE="Automatic"
